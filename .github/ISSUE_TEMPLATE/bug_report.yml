name: Bug report
description: Report a problem with Hypr
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Hypr
        2. ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Hypr version
      placeholder: e.g. v0.1.0 (or "built from source @ <commit>")
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Logs / screenshots
      description: Any relevant logs, error output, or screenshots.
