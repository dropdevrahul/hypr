name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hypr-macos-universal
            platform: darwin/universal
            os: macos-latest
          - name: hypr-linux-amd64
            platform: linux/amd64
            os: ubuntu-22.04
          - name: hypr-windows-amd64
            platform: windows/amd64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build with Wails
        uses: dAppServer/wails-build-action@v2.2
        with:
          build-name: hypr
          build-platform: ${{ matrix.platform }}
          go-version: '1.22'
          node-version: '20'
          wails-version: 'v2.12.0'
          package: false

      - name: Archive (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          cd build/bin
          if [ "$RUNNER_OS" = "macOS" ]; then
            ditto -c -k --keepParent hypr.app "../../${{ matrix.name }}.zip"
          else
            tar -czf "../../${{ matrix.name }}.tar.gz" hypr
          fi

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/hypr.exe -DestinationPath "${{ matrix.name }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.tar.gz
          if-no-files-found: ignore

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
